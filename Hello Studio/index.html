<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Studio招募</title>
    <style>
        /* 保留极简骨架，主题色改为蓝色 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f8fa;              /* 冷白底，适合蓝色主题 */
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.5;
            color: #1e1e1e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }

        .container {
            max-width: 800px;                  /* 容器宽度增大，适应大图 */
            width: 100%;
            background: #ffffff;                /* 白色卡片，略微浮起 */
            border-radius: 32px;
            padding: 3rem 3rem;                 /* 内边距增大 */
            box-shadow: 0 15px 30px -10px rgba(0, 60, 90, 0.1); /* 蓝色调阴影 */
            border: 1px solid #d9e2e8;          /* 冷灰边框 */
        }

        /* 宣传语：主题色改为蓝色 */
        .statement {
            font-size: 2.2rem;                  /* 稍微增大 */
            font-weight: 420;
            letter-spacing: -0.01em;
            margin-bottom: 0.8rem;               /* 减小底部间距，给宣传文字留空间 */
            color: #1e2a2f;
            border-left: 5px solid #2a6bda;      /* 蓝色竖线 */
            padding-left: 1.2rem;
            line-height: 1.3;
        }

        .statement small {
            font-size: 1.1rem;
            color: #5f7a9e;                      /* 淡蓝色 */
            font-weight: 350;
            display: block;
            margin-top: 0.3rem;
        }

        /* 新增：主标题下方的宣传文字 */
        .promo-text {
            font-size: 1.2rem;
            color: #3a5670;                       /* 深蓝色文字 */
            margin: 0 0 2rem 1.8rem;               /* 左对齐，与标题竖线对齐 */
            padding-left: 0.5rem;
            line-height: 1.6;
            max-width: 600px;
            font-weight: 350;
            border-bottom: 1px solid #d0e0eb;      /* 非常淡的蓝色分割线 */
            padding-bottom: 1.2rem;
        }

        /* 招募图区域：蓝色调细节 */
        .recruit-figure {
            margin: 2.5rem 0 3rem 0;
            width: 100%;
            background: #f0f5fc;                  /* 极浅的蓝色底 */
            border-radius: 28px;                   /* 圆角稍微增大 */
            padding: 2rem;                          /* 内边距增大，让图更大 */
            border: 1px solid #c9ddec;              /* 浅蓝边框 */
        }

        .recruit-figure img {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 20px;                   /* 图片圆角增大 */
            background: #ffffff;
            border: 1px solid #b8cbd9;
            box-shadow: 0 8px 18px -8px rgba(30, 90, 150, 0.2); /* 蓝色阴影 */
        }

        .image-label {
            text-align: right;
            font-size: 0.9rem;                      /* 稍微增大 */
            color: #4a6f8c;                         /* 蓝色文字 */
            margin-top: 0.8rem;
            font-family: monospace;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        /* 页尾：蓝色调细节 */
        .footer {
            margin-top: 2.5rem;
            padding-top: 1.5rem;
            border-top: 1px dashed #c0d2e0;         /* 蓝色虚线 */
            font-size: 0.9rem;                       /* 稍微增大 */
            color: #5f6f7c;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .footer a {
            color: #2a6bda;                          /* 蓝色链接 */
            text-decoration: none;
            border-bottom: 1px dotted #9bb5d1;
        }

        .footer a:hover {
            color: #1a4b9a;
            border-bottom-color: #1a4b9a;
        }

        /* 装饰小点也改为蓝色调 */
        .decor {
            width: 60px;                             /* 稍微增大 */
            height: 4px;
            background: #b2cce0;                      /* 淡蓝色 */
            margin: 1rem 0 0 auto;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 宣传语：加了颜色和一小行副文本 -->
        <div class="statement">
            Hello Studio招募
            <small>⎯ 平面 / 开发 / 设计 ⎯</small>
        </div>

        <!-- 新增：主标题下方的宣传文字 -->
        <div class="promo-text">
            我们是一个年轻的设计/开发工作室，正在寻找一起做有趣项目的伙伴。<br>
            无论你是老手还是新手，只要对创意有热情，都欢迎聊聊。
        </div>

        <!-- 招募图区域：暖色衬底，突出图片。图片名已改为 1image.png -->
        <div class="recruit-figure">
            <img src="1image.png" alt="工作室招募" onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22700%22%20height%3D%22350%22%20viewBox%3D%220%200%20700%20350%22%3E%3Crect%20width%3D%22700%22%20height%3D%22350%22%20fill%3D%22%23e1f0fa%22%2F%3E%3Ctext%20x%3D%22250%22%20y%3D%22180%22%20font-family%3D%22monospace%22%20font-size%3D%2224%22%20fill%3D%22%233a6ea5%22%3E1image.png%3C%2Ftext%3E%3C%2Fsvg%3E';">
            <div class="image-label">招募-等你来</div>
        </div>
        
        <!-- 一个不起眼的小装饰，增加层次（可忽略） -->
        <div class="decor"></div>

        <!-- 页尾：完全保留参考里的文字，但颜色略暖 -->
        <div class="footer">
            <span>© Hello Studio</span>
            <span>由 <a href="#">DeepSeek</a> 辅助编写 · 如有侵权请联系删除</span>
        </div>
    </div>
</body>
</html>
