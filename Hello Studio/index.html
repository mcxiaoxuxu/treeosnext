<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Studio招募</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #e3effa;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.5;
            color: #1e2b3a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            max-width: 1100px;
            width: 100%;
            background: white;
            border-radius: 40px;
            padding: 3rem;
            box-shadow: 0 30px 45px -20px #1e4f8a;
            border: 1px solid #c2d9f0;
        }

        .title {
            font-size: 2.6rem;
            font-weight: 500;
            color: #0a2647;
            border-left: 6px solid #1e6df2;
            padding-left: 1.5rem;
            margin-bottom: 1rem;
        }

        .title small {
            font-size: 1.3rem;
            color: #2f6e9e;
            font-weight: 400;
            display: block;
            margin-top: 0.3rem;
        }

        .content {
            display: flex;
            flex-wrap: wrap;
            gap: 3rem;
            margin: 2rem 0 2.5rem;
            align-items: center;
        }

        .left {
            flex: 1 1 300px;
        }

        .description {
            font-size: 1.25rem;
            color: #1f4973;
            line-height: 1.7;
            background: #e5f0ff;
            padding: 2rem;
            border-radius: 30px;
            border-left: 4px solid #3680e6;
            margin-bottom: 2rem;
        }

        .note {
            background: #d4e6ff;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            display: inline-block;
            color: #0f3b73;
            font-weight: 500;
            font-size: 1.2rem;
            border: 1px solid #9bc0ed;
        }

        .note span {
            background: #1e6df2;
            color: white;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            margin-left: 0.8rem;
        }

        .right {
            flex: 1.2 1 450px;
        }

        .image-box {
            width: 100%;
            background: #d4e6ff;
            border-radius: 36px;
            padding: 2rem;
            border: 2px solid #9ac2f0;
        }

        .image-box img {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 28px;
            border: 2px solid white;
            box-shadow: 0 15px 30px -12px #0a3e6b;
        }

        .image-label {
            text-align: center;
            font-size: 1rem;
            color: #1b5a9c;
            margin-top: 1rem;
            background: #ecf5ff;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            display: inline-block;
            border: 1px solid #a7c8f2;
        }

        .footer {
            margin-top: 2.5rem;
            padding: 1.5rem 2rem;
            background: #e5f0ff;
            border-radius: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            color: #2b4b73;
            border: 1px solid #c2d6e8;
        }

        .footer a {
            color: #1e6df2;
            text-decoration: none;
            border-bottom: 1px solid #a7c8f2;
        }

        .footer a:hover {
            color: #0a3b7a;
            border-bottom-color: #0a3b7a;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">
            Hello Studio招募
            <small>平面 开发 设计</small>
        </div>

        <div class="content">
            <div class="left">
                <div class="description">
                    我们是一个年轻的设计/开发工作室，成立于2026年2月23日，正在寻找一起做有趣项目的伙伴。<br><br>
                    无论你是老手还是新手，只要对创意有热情，都欢迎加入。
                </div>
                
                <div class="note">
                    加入须知 <span>无薪资 偶尔小奖金</span>
                </div>
            </div>

            <div class="right">
                <div class="image-box">
                    <img src="1image.png" alt="工作室招募" onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22580%22%20height%3D%22360%22%20viewBox%3D%220%200%20580%20360%22%3E%3Crect%20width%3D%22580%22%20height%3D%22360%22%20fill%3D%22%232163c7%22%2F%3E%3Ctext%20x%3D%22200%22%20y%3D%22190%22%20font-family%3D%22monospace%22%20font-size%3D%2232%22%20fill%3D%22%23ffffff%22%3E1image.png%3C%2Ftext%3E%3C%2Fsvg%3E';">
                    <div class="image-label">1image.png 招募视觉</div>
                </div>
            </div>
        </div>

        <div class="footer">
            <span>Hello Studio</span>
            <span>由 DeepSeek 辅助编写 如有侵权请联系删除</span>
        </div>
    </div>
</body>
</html>
