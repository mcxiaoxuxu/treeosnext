<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作室招募</title>
    <style>
        /* 保留极简骨架，只增加色彩和一点点细节 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #faf8f5;              /* 暖白底，比纯白有温度 */
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.5;
            color: #1e1e1e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }

        .container {
            max-width: 620px;
            width: 100%;
            background: #ffffff;                /* 白色卡片，略微浮起 */
            border-radius: 32px;
            padding: 2.8rem 2.5rem;
            box-shadow: 0 15px 30px -10px rgba(0, 40, 30, 0.1);
            border: 1px solid #e9e2d8;          /* 暖灰边框 */
        }

        /* 宣传语：带一点强调色 */
        .statement {
            font-size: 2rem;
            font-weight: 420;
            letter-spacing: -0.01em;
            margin-bottom: 2.2rem;
            color: #1e2a2f;
            border-left: 5px solid #da4b2a;      /* 砖红色竖线，提神 */
            padding-left: 1.2rem;
            line-height: 1.3;
        }

        .statement small {
            font-size: 1rem;
            color: #bf7b6a;                      /* 同色系淡一点 */
            font-weight: 350;
            display: block;
            margin-top: 0.3rem;
        }

        /* 招募图区域：加个淡淡的背景和圆角 */
        .recruit-figure {
            margin: 2.5rem 0 3rem 0;
            width: 100%;
            background: #fdf3ed;                  /* 极浅的暖色底 */
            border-radius: 24px;
            padding: 1.5rem;
            border: 1px solid #ffe1d4;
        }

        .recruit-figure img {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 16px;                   /* 图片圆角 */
            background: #ffffff;
            border: 1px solid #e0cfc0;
            box-shadow: 0 6px 12px -6px rgba(180, 100, 50, 0.15);
        }

        .image-label {
            text-align: right;
            font-size: 0.8rem;
            color: #c0664a;                         /* 暖色文字 */
            margin-top: 0.6rem;
            font-family: monospace;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        /* 页尾：和参考风格保持一致，但加一点点色彩细节 */
        .footer {
            margin-top: 2.5rem;
            padding-top: 1.5rem;
            border-top: 1px dashed #e0cfc0;         /* 虚线更轻松 */
            font-size: 0.8rem;
            color: #7a6a60;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .footer a {
            color: #b1553a;
            text-decoration: none;
            border-bottom: 1px dotted #eab7a6;
        }

        .footer a:hover {
            color: #da4b2a;
            border-bottom-color: #da4b2a;
        }

        /* 可选：加一个很淡的装饰小点，不抢眼 */
        .decor {
            width: 50px;
            height: 3px;
            background: #e7cdbc;
            margin: 1rem 0 0 auto;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 宣传语：加了颜色和一小行副文本 -->
        <div class="statement">
            Hello Studio
            <small>⎯ 平面 / 开发 / 策划 ⎯</small>
        </div>

        <!-- 招募图区域：暖色衬底，突出图片 -->
        <div class="recruit-figure">
            <img src="1image.png" alt="工作室招募视觉" onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22560%22%20height%3D%22280%22%20viewBox%3D%220%200%20560%20280%22%3E%3Crect%20width%3D%22560%22%20height%3D%22280%22%20fill%3D%22%23fae1d4%22%2F%3E%3Ctext%20x%3D%22180%22%20y%3D%22150%22%20font-family%3D%22monospace%22%20font-size%3D%2220%22%20fill%3D%22%23b45a3a%22%3E1iamge.png%3C%2Ftext%3E%3C%2Fsvg%3E';">
            <div class="image-label">📁 1image.png · 招募主视觉</div>
        </div>
        
        <!-- 一个不起眼的小装饰，增加层次（可忽略） -->
        <div class="decor"></div>

        <!-- 页尾：完全保留参考里的文字，但颜色略暖 -->
        <div class="footer">
            <span>© Hello Studio</span>
            <span>由 <a href="#">DeepSeek</a> 辅助编写 · 如有侵权请联系删除</span>
        </div>
    </div>
</body>
</html>
